{% extends "auth_base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<form method="POST" class="bg-gray-800 p-8 rounded-xl w-96 shadow-lg">
    {% csrf_token %}

    <h2 class="text-3xl font-bold mb-6 text-center">Register</h2>

    <!-- Username -->
    <input name="username" placeholder="Username"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- Email -->
    <input name="email" placeholder="Email"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- Password -->
    <input name="password1" type="password" placeholder="Password"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- Confirm Password -->
    <input name="password2" type="password" placeholder="Confirm Password"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">

    <!-- Role -->
    <select name="role"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600">
        <option value="MEMBER">Member</option>
        <option value="ADMIN">Admin</option>
    </select>

    <!-- Button -->
    <button class="bg-blue-500 hover:bg-blue-600 transition px-4 py-2 w-full rounded-lg font-semibold">
        Signup
    </button>

    <p class="mt-4 text-sm text-center">
        Already have an account?
        <a href="/" class="text-blue-400 hover:underline">Login</a>
    </p>
</form>
{% endblock %}
