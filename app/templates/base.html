{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Task Manager{% endblock %}</title>

    {% tailwind_css %}

    <!-- Alpine.js (for sidebar toggle) -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>

<body x-data="{ sidebarOpen: false }" class="bg-gray-900 text-white">

<!-- 🔹 Sidebar -->
<aside 
    :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
    class="fixed md:translate-x-0 transform top-0 left-0 w-64 h-screen 
           bg-gray-800 shadow-lg z-50 flex flex-col
           transition-transform duration-300">

    <!-- Logo -->
    <div class="p-5 border-b border-gray-700">
        <h1 class="text-xl font-bold">📋 Task Manager</h1>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 p-4 space-y-2">

        <a href="/dashboard/" class="block px-4 py-2 rounded hover:bg-gray-700">
            Dashboard
        </a>

    </nav>

    <!-- User -->
    <div class="p-4 border-t border-gray-700 text-sm">
        <p>{{ request.user.username }}</p>
        <p class="text-gray-400">{{ request.user.role }}</p>

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="mt-2 bg-red-500 px-3 py-1 rounded w-full">
                Logout
            </button>
        </form>
    </div>
</aside>

<!-- 🔹 Main -->
<main class="md:ml-64 min-h-screen">

    <!-- Header -->
    <header class="bg-gray-800 p-4 flex justify-between items-center">

        <!-- Mobile Button -->
        <button @click="sidebarOpen = !sidebarOpen" class="md:hidden">
            ☰
        </button>

        <h2 class="text-xl font-bold">
            {% block page_title %}{% endblock %}
        </h2>

        <div>
            👋 {{ request.user.username }}
        </div>

    </header>

    <!-- Content -->
    <div class="p-6">
        {% block content %}{% endblock %}
    </div>

</main>

</body>
</html>
