{% extends "base.html" %}

{% block title %}Create Project{% endblock %}

{% block content %}
<form method="POST" class="bg-gray-800 p-8 rounded-xl w-96 shadow-lg">
    {% csrf_token %}

    <h2 class="text-2xl mb-4 font-bold">Create Project</h2>

    <input name="name" placeholder="Project Name"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600">

    <textarea name="description" placeholder="Description"
        class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-700 border border-gray-600"></textarea>

    <button class="bg-blue-500 px-4 py-2 w-full rounded-lg">
        Create
    </button>
</form>
{% endblock %}
