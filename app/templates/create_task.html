{% extends "base.html" %}

{% block title %}Create Task{% endblock %}

{% block content %}
<form method="POST" class="bg-gray-800 p-8 rounded-xl w-96 shadow-lg">
    {% csrf_token %}

    <h2 class="text-2xl mb-4">Create Task</h2>

    <input name="title" placeholder="Title" class="w-full mb-3 p-2 bg-gray-700 rounded">
    <textarea name="description" placeholder="Description" class="w-full mb-3 p-2 bg-gray-700 rounded"></textarea>

    <input type="date" name="due_date" class="w-full mb-3 p-2 bg-gray-700 rounded">

    <select name="priority" class="w-full mb-3 p-2 bg-gray-700 rounded">
        <option value="LOW">Low</option>
        <option value="MEDIUM">Medium</option>
        <option value="HIGH">High</option>
    </select>

    <select name="assigned_to" class="w-full p-2 bg-gray-700 rounded">
        {% for user in users %}
            <option value="{{ user.id }}">
                {{ user.username }} ({{ user.role }})
            </option>
        {% endfor %}
    </select>

    <button class="bg-green-500 px-4 py-2 w-full rounded">Create Task</button>
</form>
{% endblock %}
